<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSC Picks - Brackets</title>
  <link rel="stylesheet" href="style.css?v=20260428-1305">
  <style>
    .bracket-toolbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .bracket-board {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(230px, 1fr);
      gap: 18px;
      overflow-x: auto;
      padding-bottom: 16px;
    }
    .worldcup-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .group-title {
      font-family: var(--font-display);
      color: var(--accent);
      font-size: 20px;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }
    .group-row {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .thirds-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin: 0 0 24px;
    }
    .thirds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .third-check {
      display: grid;
      grid-template-columns: 52px 1fr;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .bracket-stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, .8fr) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 16px;
    }
    .bracket-side {
      display: grid;
      grid-template-columns: repeat(2, minmax(210px, 1fr));
      gap: 18px;
      align-items: start;
    }
    .bracket-side.three {
      grid-template-columns: repeat(3, minmax(210px, 1fr));
    }
    .bracket-center {
      display: grid;
      gap: 18px;
      align-content: center;
      min-width: 220px;
    }
    .bracket-board.compact {
      grid-auto-columns: minmax(210px, 1fr);
    }
    .bracket-round {
      display: grid;
      gap: 14px;
      align-content: start;
      min-width: 220px;
    }
    .bracket-round-title {
      font-family: var(--font-display);
      letter-spacing: .6px;
      font-size: 22px;
      color: var(--accent);
    }
    .bracket-match {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .bracket-team {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid transparent;
      color: var(--text);
      cursor: pointer;
    }
    .bracket-team:hover,
    .bracket-team.selected {
      border-color: var(--accent);
      color: var(--accent);
    }
    .bracket-seed {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <header id="navbar" class="navbar container"></header>

  <main class="container page">
    <div class="bracket-toolbar">
      <div>
        <div class="picks-league-name">SIMULADOR</div>
        <div class="picks-round-name">Brackets</div>
      </div>
      <div class="form-group" style="min-width:260px;">
        <label class="form-label">Competencia</label>
        <select id="league-select" class="form-select"></select>
      </div>
    </div>

    <div id="groups-area"></div>
    <div id="bracket-area" class="bracket-board"></div>
  </main>

  <script src="config.js"></script>
  <script src="logos.js"></script>
  <script src="app.js?v=20260428-1305"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');
    renderNav('brackets');
    if (typeof displayTeamName !== 'function') {
      window.displayTeamName = name => String(name || '');
    }

    const ELIGIBLE_SLUGS = new Set([
      'mundial-2026',
      'uefa-champions-league',
      'uefa-europa-league',
      'uefa-conference-league',
      'nba',
      'nba-playoffs',
      'nfl',
      'mlb-playoffs',
      'nhl-playoffs'
    ]);

    const TEMPLATES = {
      'mundial-2026': ['Dieciseisavos', 'Octavos', 'Cuartos', 'Semi', 'Final'],
      'uefa-champions-league': ['Octavos', 'Cuartos', 'Semi', 'Final'],
      'uefa-europa-league': ['Octavos', 'Cuartos', 'Semi', 'Final'],
      'uefa-conference-league': ['Octavos', 'Cuartos', 'Semi', 'Final'],
      'nba': ['Primera ronda', 'Semifinal conf.', 'Final conf.', 'Final NBA'],
      'nba-playoffs': ['Primera ronda', 'Semifinal conf.', 'Final conf.', 'Final NBA'],
      'nfl': ['Wild Card', 'Divisional', 'Conferencia', 'Super Bowl'],
      'mlb-playoffs': ['Wild Card', 'Divisional', 'Serie Campeonato', 'Serie Mundial'],
      'nhl-playoffs': ['Primera ronda', 'Semifinal conf.', 'Final conf.', 'Stanley Cup']
    };

    const WORLD_CUP_GROUPS = {
      A: ['Mexico', 'South Africa', 'South Korea', 'Czechia'],
      B: ['Canada', 'Qatar', 'Switzerland', 'Bosnia-Herzegovina'],
      C: ['Brazil', 'Morocco', 'Scotland', 'Haiti'],
      D: ['United States', 'Paraguay', 'Australia', 'Turkiye'],
      E: ['Germany', 'Ecuador', 'Ivory Coast', 'Curacao'],
      F: ['Netherlands', 'Japan', 'Tunisia', 'Sweden'],
      G: ['Belgium', 'Iran', 'Egypt', 'New Zealand'],
      H: ['Spain', 'Uruguay', 'Saudi Arabia', 'Cape Verde'],
      I: ['France', 'Senegal', 'Norway', 'Iraq'],
      J: ['Argentina', 'Austria', 'Algeria', 'Jordan'],
      K: ['Portugal', 'Colombia', 'Uzbekistan', 'Congo DR'],
      L: ['England', 'Croatia', 'Panama', 'Ghana']
    };

    let allLeagues = [];
    let currentSlug = '';
    let picksState = {};

    async function init() {
      const select = document.getElementById('league-select');
      const leagues = await api('/leagues');
      allLeagues = leagues.filter(l => ELIGIBLE_SLUGS.has(l.slug));
      const eligible = allLeagues;
      select.innerHTML = eligible.map(l => `<option value="${l.slug}">${l.name}</option>`).join('');
      select.onchange = () => renderBracket(select.value);
      await renderBracket(select.value || 'mundial-2026');
    }

    async function renderBracket(slug) {
      currentSlug = slug;
      picksState = picksState[slug] ? picksState : { ...picksState, [slug]: {} };
      document.getElementById('groups-area').innerHTML = '';

      if (slug === 'mundial-2026') {
        renderWorldCupGroups();
        renderKnockout(TEMPLATES[slug], worldCupFirstRound());
        return;
      }

      const firstRound = await firstRoundForLeague(slug);
      renderKnockout(TEMPLATES[slug] || TEMPLATES['nba-playoffs'], firstRound);
    }

    function renderWorldCupGroups() {
      const area = document.getElementById('groups-area');
      area.innerHTML = worldCupGroupsHtml();
    }

    function worldCupGroupsHtml() {
      return `<div class="worldcup-groups">
        ${Object.entries(WORLD_CUP_GROUPS).map(([group, teams]) => groupCard(group, teams)).join('')}
      </div>`;
    }

    function groupCard(group, teams) {
      const saved = picksState[currentSlug];
      [1, 2, 3, 4].forEach(pos => {
        if (!saved[`g-${group}-${pos}`]) saved[`g-${group}-${pos}`] = teams[pos - 1];
      });
      return `
        <section class="group-card">
          <div class="group-title">Grupo ${group}</div>
          ${[1,2,3,4].map(pos => `
            <div class="group-row">
              <span class="bracket-seed">${pos}º</span>
              <select class="form-select" onchange="setGroupPick('${group}', ${pos}, this.value)">
                ${teams.map(t => `<option value="${t}" ${saved[`g-${group}-${pos}`] === t ? 'selected' : ''}>${displayTeamName(t)}</option>`).join('')}
              </select>
            </div>
          `).join('')}
        </section>`;
    }

    function setGroupPick(group, pos, value) {
      picksState[currentSlug][`g-${group}-${pos}`] = value;
      ensureThirdRanking();
      renderWorldCupGroups();
      renderKnockout(TEMPLATES[currentSlug], worldCupFirstRound());
    }

    function ensureThirdRanking() {
      const s = picksState[currentSlug];
      const groups = Object.keys(WORLD_CUP_GROUPS);
      const chosen = new Set();
      for (let pos = 1; pos <= 8; pos++) {
        const key = `best-third-rank-${pos}`;
        if (!s[key] || chosen.has(s[key])) {
          s[key] = groups.find(g => !chosen.has(g)) || groups[0];
        }
        chosen.add(s[key]);
      }
    }

    function bestThirdsPanel() {
      ensureThirdRanking();
      const s = picksState[currentSlug];
      const groups = Object.keys(WORLD_CUP_GROUPS);
      return `
        <section class="thirds-panel">
          <div class="group-title">Mejores terceros</div>
          <div class="thirds-grid">
            ${Array.from({ length: 8 }).map((_, i) => {
              const rank = i + 1;
              const selectedGroup = s[`best-third-rank-${rank}`];
              return `<label class="third-check">
                <span class="bracket-seed">Mejor 3º ${rank}</span>
                <select class="form-select" onchange="setThirdRank(${rank}, this.value)">
                  ${groups.map(g => {
                    const team = s[`g-${g}-3`];
                    return `<option value="${g}" ${selectedGroup === g ? 'selected' : ''}>${displayTeamName(team)} - Grupo ${g}</option>`;
                  }).join('')}
                </select>
              </label>`;
            }).join('')}
          </div>
        </section>`;
    }

    function setThirdRank(rank, group) {
      const s = picksState[currentSlug];
      for (let pos = 1; pos <= 8; pos++) {
        if (pos !== rank && s[`best-third-rank-${pos}`] === group) {
          s[`best-third-rank-${pos}`] = s[`best-third-rank-${rank}`];
        }
      }
      s[`best-third-rank-${rank}`] = group;
      renderWorldCupGroups();
      renderKnockout(TEMPLATES[currentSlug], worldCupFirstRound());
    }

    function worldCupFirstRound() {
      const s = picksState[currentSlug];
      const team = (group, pos, seed) => ({ name: s[`g-${group}-${pos}`], logo: '', seed });
      ensureThirdRanking();
      const third = rank => {
        const group = s[`best-third-rank-${rank}`];
        return { name: s[`g-${group}-3`] || `Mejor 3º ${rank}`, logo: '', seed: `3${group}` };
      };
      const thirds = Array.from({ length: 8 }).map((_, i) => {
        const group = s[`best-third-rank-${i + 1}`];
        return { name: s[`g-${group}-3`] || `Mejor 3º ${i + 1}`, logo: '', seed: `3${group}` };
      });
      return [
        [team('A', 1, '1A'), third(1)],
        [team('B', 1, '1B'), third(2)],
        [team('C', 1, '1C'), third(3)],
        [team('D', 1, '1D'), third(4)],
        [team('E', 1, '1E'), team('F', 2, '2F')],
        [team('F', 1, '1F'), team('E', 2, '2E')],
        [team('G', 1, '1G'), team('H', 2, '2H')],
        [team('H', 1, '1H'), team('G', 2, '2G')],
        [team('I', 1, '1I'), third(5)],
        [team('J', 1, '1J'), third(6)],
        [team('K', 1, '1K'), third(7)],
        [team('L', 1, '1L'), third(8)],
        [team('A', 2, '2A'), team('B', 2, '2B')],
        [team('C', 2, '2C'), team('D', 2, '2D')],
        [team('I', 2, '2I'), team('J', 2, '2J')],
        [team('K', 2, '2K'), team('L', 2, '2L')]
      ];
    }

    async function firstRoundForLeague(slug) {
      if (slug === 'nba-playoffs' || slug === 'nba') {
        const standings = await nbaFirstRoundFromStandings(slug);
        if (standings?.length) return standings;
      }
      return firstRoundFromFixtures(slug);
    }

    async function nbaFirstRoundFromStandings(slug) {
      const league = allLeagues.find(l => l.slug === slug || (slug === 'nba-playoffs' && l.slug === 'nba-playoffs'));
      if (!league) return null;
      try {
        const data = await api(`/standings?league_id=${league.id}`);
        const rows = data.standings || [];
        if (rows.length < 16) return null;

        const eastRows = rows.filter(r => /east|este/i.test(r.group || '')).slice(0, 8);
        const westRows = rows.filter(r => /west|oeste/i.test(r.group || '')).slice(0, 8);
        const east = eastRows.length >= 8 ? eastRows : rows.slice(0, 8);
        const west = westRows.length >= 8 ? westRows : rows.slice(8, 16);
        if (east.length < 8 || west.length < 8) return null;

        return [
          ...seededConferenceMatches(west, 'W'),
          ...seededConferenceMatches(east, 'E')
        ];
      } catch {
        return null;
      }
    }

    function seededConferenceMatches(rows, prefix) {
      return [[1,8], [4,5], [3,6], [2,7]].map(([a, b]) => [
        standingTeam(rows[a - 1], `${prefix}${a}`),
        standingTeam(rows[b - 1], `${prefix}${b}`)
      ]);
    }

    function standingTeam(row, seed) {
      return { name: row?.team || `Seed ${seed}`, logo: row?.logo || '', seed };
    }

    async function firstRoundFromFixtures(slug) {
      const league = allLeagues.find(l => l.slug === slug);
      if (!league) return fallbackFirstRound(slug);
      try {
        const rounds = await api(`/rounds?league_id=${league.id}`);
        const first = rounds.find(r => /1|primera|wild|octavos/i.test(r.name)) || rounds[0];
        if (!first) return fallbackFirstRound(slug);
        const fixtures = await api(`/fixtures?round_id=${first.id}`);
        if (!fixtures.length) return fallbackFirstRound(slug);
        if (slug === 'nba-playoffs' && fixtures.length < 8) {
          return [...fixtures.map(f => [
            { name: f.home_team, logo: f.home_logo },
            { name: f.away_team, logo: f.away_logo }
          ]), ...nbaPlayoffFallback().slice(fixtures.length)];
        }
        return fixtures.map(f => [
          { name: f.home_team, logo: f.home_logo },
          { name: f.away_team, logo: f.away_logo }
        ]);
      } catch {
        return fallbackFirstRound(slug);
      }
    }

    function fallbackFirstRound(slug) {
      if (slug === 'nba-playoffs' || slug === 'nba') return nbaPlayoffFallback();
      const count = slug === 'nfl' ? 6 : 8;
      return Array.from({ length: count }, (_, i) => [`Equipo ${i + 1}A`, `Equipo ${i + 1}B`]);
    }

    function nbaPlayoffFallback() {
      return [
        ['Detroit Pistons', 'Orlando Magic'],
        ['Oklahoma City Thunder', 'Phoenix Suns'],
        ['Denver Nuggets', 'Minnesota Timberwolves'],
        ['LA Clippers', 'Golden State Warriors'],
        ['Los Angeles Lakers', 'Memphis Grizzlies'],
        ['Miami Heat', 'Milwaukee Bucks'],
        ['New York Knicks', 'Cleveland Cavaliers'],
        ['Boston Celtics', 'Philadelphia 76ers']
      ];
    }

    function renderKnockout(rounds, firstMatches) {
      if (currentSlug === 'mundial-2026') {
        document.getElementById('groups-area').innerHTML = worldCupGroupsHtml() + bestThirdsPanel();
      }
      const generated = [firstMatches];
      for (let r = 1; r < rounds.length; r++) {
        const prev = generated[r - 1];
        generated[r] = Array.from({ length: Math.ceil(prev.length / 2) }, (_, i) => [
          winnerObj(r - 1, i * 2) || `Ganador ${i * 2 + 1}`,
          winnerObj(r - 1, i * 2 + 1) || `Ganador ${i * 2 + 2}`
        ]);
      }

      if (currentSlug === 'nba-playoffs' || currentSlug === 'mundial-2026') {
        renderPlayoffLayout(rounds, generated);
        return;
      }

      const area = document.getElementById('bracket-area');
      area.className = 'bracket-board';
      area.innerHTML = rounds.map((round, idx) => `
        <section class="bracket-round">
          <div class="bracket-round-title">${round}</div>
          ${generated[idx].map((match, i) => bracketMatch(match, idx, i)).join('')}
        </section>
      `).join('');
    }

    function renderPlayoffLayout(rounds, generated) {
      const area = document.getElementById('bracket-area');
      area.className = 'bracket-stage';
      const first = generated[0] || [];
      const isWorldCup = currentSlug === 'mundial-2026';
      const west = first.slice(0, Math.ceil(first.length / 2));
      const east = first.slice(Math.ceil(first.length / 2));

      if (isWorldCup) {
        area.innerHTML = `
          <div class="bracket-side three">
            ${playoffColumn('Dieciseisavos', first.slice(0, 8), 0, 0)}
            ${playoffColumn('Octavos', (generated[1] || []).slice(0, 4), 1, 0)}
            ${playoffColumn('Cuartos', (generated[2] || []).slice(0, 2), 2, 0)}
          </div>
          <div class="bracket-center">
            ${playoffColumn('Final', generated[4] || [], 4, 0)}
            ${playoffColumn('Semifinales', generated[3] || [], 3, 0)}
          </div>
          <div class="bracket-side three">
            ${playoffColumn('Cuartos', (generated[2] || []).slice(2, 4), 2, 2)}
            ${playoffColumn('Octavos', (generated[1] || []).slice(4, 8), 1, 4)}
            ${playoffColumn('Dieciseisavos', first.slice(8, 16), 0, 8)}
          </div>
        `;
        return;
      }

      area.innerHTML = `
        <div class="bracket-side">
          ${playoffColumn('Oeste - 1º Ronda', west, 0, 0)}
          ${playoffColumn('Oeste - Semis', generated[1]?.slice(0, Math.ceil((generated[1] || []).length / 2)) || [], 1, 0)}
        </div>
        <div class="bracket-center">
          ${playoffColumn('Final NBA', generated[generated.length - 1] || [], generated.length - 1, 0)}
          ${playoffColumn('Finales de Conferencia', generated[generated.length - 2] || [], generated.length - 2, 0)}
        </div>
        <div class="bracket-side">
          ${playoffColumn('Este - Semis', generated[1]?.slice(Math.ceil((generated[1] || []).length / 2)) || [], 1, Math.ceil((generated[1] || []).length / 2))}
          ${playoffColumn('Este - 1º Ronda', east, 0, west.length)}
        </div>
      `;
    }

    function playoffColumn(title, matches, roundIdx, offset) {
      return `<section class="bracket-round">
        <div class="bracket-round-title">${title}</div>
        ${matches.map((match, i) => bracketMatch(match, roundIdx, i + offset)).join('')}
      </section>`;
    }

    function winnerLabel(roundIdx, matchIdx) {
      return winnerObj(roundIdx, matchIdx)?.name || '';
    }

    function winnerObj(roundIdx, matchIdx) {
      const winner = picksState[currentSlug][`w-${roundIdx}-${matchIdx}`];
      return winner ? (typeof winner === 'object' ? winner : { name: winner, logo: '' }) : null;
    }

    function bracketMatch(match, roundIdx, matchIdx) {
      return `
        <div class="bracket-match">
          ${bracketTeam(match[0], roundIdx, matchIdx)}
          ${bracketTeam(match[1], roundIdx, matchIdx)}
        </div>
      `;
    }

    function bracketTeam(team, roundIdx, matchIdx) {
      const obj = typeof team === 'object' ? team : { name: team, logo: '' };
      const selected = winnerLabel(roundIdx, matchIdx) === obj.name ? 'selected' : '';
      return `
        <button class="bracket-team ${selected}" onclick="setWinner(${roundIdx}, ${matchIdx}, '${encodeURIComponent(obj.name)}', '${encodeURIComponent(obj.logo || '')}')">
          ${teamLogoHtml(obj.logo || '', obj.name, 'team-logo')}
          <span>${displayTeamName(obj.name)}</span>
          <span class="bracket-seed">${obj.seed || matchIdx + 1}</span>
        </button>
      `;
    }

    function setWinner(roundIdx, matchIdx, name, logo) {
      picksState[currentSlug][`w-${roundIdx}-${matchIdx}`] = {
        name: decodeURIComponent(name),
        logo: decodeURIComponent(logo || '')
      };
      if (currentSlug === 'mundial-2026') renderKnockout(TEMPLATES[currentSlug], worldCupFirstRound());
      else renderBracket(currentSlug);
    }

    init().catch(e => {
      document.getElementById('bracket-area').innerHTML = `<div class="empty"><div class="empty-title">${e.message}</div></div>`;
    });
  </script>
</body>
</html>
